# ============================================================================
# Self-host PRIVATE global default — GENERIC EXAMPLE, safe to publish
# ============================================================================
#
# Copy this file to the ROOT of your own GITTENSORY_REPO_CONFIG_DIR mount (e.g.
# `./gittensory-config/.loopover.yml` for the default docker-compose.yml mount) and edit your
# copy — never this one. It applies to every repo that has no per-repo file of its own, and is
# deep-merged UNDER any per-repo file that does exist (see ../README.md for the precedence chain
# and merge semantics; see ../../.loopover.yml.example at the repo root for every supported
# field — this file uses the exact same schema, just a private location).
#
# Every value below is an illustrative placeholder. Replace the login and thresholds with your
# own before using this file for real; do not commit your edited copy to a public repo.
# ============================================================================

# Baseline gate policy shared by every repo unless a per-repo file overrides it.
gate:
  enabled: true
  # Review-check publish mode (#2852): required | visible | disabled. RECOMMENDED fleet-wide default
  # for high-volume autonomous self-hosting is `visible` or `disabled`, NOT `required` — Gittensory's
  # own merge/close decisions never depend on this check either way. If you set this to `disabled`
  # instance-wide, remove "Gittensory Orb Review Agent" from every repo's branch-protection required-
  # status-checks list first (Gittensory cannot do this for you — it's a GitHub branch-protection
  # setting), or GitHub will show a pending status forever on repos that still require it.
  checkMode: visible
  duplicates: block
  linkedIssue: advisory

# Anti-abuse + presentation defaults shared by every repo.
settings:
  # Recommended one-shot-mode autonomy baseline (#label-scoping): `close` authorizes both the
  # terminal merge/close/hold disposition AND every anti-abuse enforcement label (blacklist/
  # contributor-cap/review-nag) below — no separate `label` grant needed for those.
  # `review_state_label` is left at the default `observe` so the bot's own advisory disposition
  # labels (ready-to-merge/changes-requested/manual-review) never appear — a
  # one-shot review merges, closes, or holds through the required gate check alone, with no running
  # commentary as GitHub labels. Set `review_state_label: auto` only if you specifically want that
  # commentary too.
  autonomy:
    close: auto

  # Max PRs a single non-owner/non-admin/non-bot contributor may have open at once, instance-wide
  # default. A per-repo file can override this per repo, or set it to `null` to disable it there.
  contributorOpenPrCap: 3

  # GitHub logins exempt from the shared anti-abuse mechanisms above (on top of the standing
  # owner/admin/automation-bot exemption). Replace with your own maintainer/admin logins.
  autoCloseExemptLogins:
    - your-admin-login

  # Hard manual-review path guardrails are config-as-code only and safe by default (#3943): this list is
  # ADDED to a fixed, built-in invariant set (DEFAULT_HARD_GUARDRAIL_GLOBS in
  # src/review/guardrail-config.ts), never allowed to shrink it. Set
  # hardGuardrailGlobsOverridesInvariants: true below to let this list fully REPLACE the built-in set
  # instead (including [] to disable path guardrails entirely) — a deliberate opt-in, not the default.
  hardGuardrailGlobs: []
  hardGuardrailGlobsOverridesInvariants: false

  # Disposition label names are config-as-code, not engine identity. Set any value to your repo's
  # preferred label name, or explicit null to disable that label while preserving the action/hold.
  manualReviewLabel: manual-review
  readyToMergeLabel: null
  changesRequestedLabel: null
  migrationCollisionLabel: migration-collision
  pendingClosureLabel: pending-closure

  # Maintainer-mention nag moderation (#label-scoping): throttle a contributor who repeatedly tags a
  # configured maintainer login for review/status, reusing the review-nag cooldown below. Replace with
  # your own maintainer logins; empty/omitted (the default) watches nobody.
  reviewNagPolicy: hold
  reviewNagMaxPings: 3
  reviewNagCooldownDays: 5
  reviewNagMonitoredMentions:
    - your-maintainer-login

# Converged-feature activation shared by every repo unless a per-repo file overrides a key (#4190). Each key
# still needs its own deployment-wide GITTENSORY_REVIEW_* env flag ON before this block has any effect at all
# — this section only controls the PER-REPO default once the operator has already turned a feature on
# fleet-wide. `e2eTests` gates the opt-in AI-generated E2E test coverage feature (epic #4189); leaving it
# false/omitted here keeps every repo dark by default until a per-repo file opts in.
features:
  e2eTests: false
