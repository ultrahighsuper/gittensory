# Per-repo activation overrides for the converged review features that ship behind a deployment-wide
# GITTENSORY_REVIEW_* env kill-switch (rag/reputation/unifiedComment/safety/grounding/e2eTests). Each key is
# `true` (force on for this repo, subject to the env flag still being enabled), `false` (force off), or omitted
# (falls back to the GITTENSORY_REVIEW_REPOS allowlist default -- an operator who sets nothing keeps today's
# behavior). Exception: `safety` is force-on-only -- an untrusted repo-controlled `false` is treated as "no
# opinion" rather than an active force-off (#2269), since a lower-trust actor must never be able to silently
# defeat the operator's own security-hardening enablement. `e2eTests` (#4190) is a plain symmetric override
# like rag/reputation/unifiedComment -- generating AI test content carries no security-hardening rationale to
# protect from a repo-controlled override, so there's no force-on/force-off asymmetry here.
# features:
#   rag: true
#   reputation: false
#   unifiedComment: true
#   safety: true
#   grounding: true
#   e2eTests: false

# Registry-review lane (#2435): lets a self-hosted maintainer point gittensory at their OWN structured
# registry (e.g. a subnet/plugin/package catalog) without a gittensory code change -- reviewing additions
# to a data file the same way it reviews code. Uncomment and set at least entryFileGlob + collectionField
# (both required; the block is ignored with a warning if either is missing).
# contentLane:
#   entryFileGlob: registry/*.json      # Glob for the structured entry files this lane reviews. Required.
#   collectionField: entries            # The JSON field holding the collection this lane diffs. Required.
#   providerFileGlob: providers/*.ts    # Optional glob for source files the entries are validated against.
#   artifactGlob: dist/registry.json    # Optional glob for a generated/build artifact to cross-check.
#   maxAppendedEntries: 1               # Positive integer cap on new entries per PR. Default: unbounded.
#   duplicateKeyFields: [slug]          # Field name(s) used to detect a duplicate entry. Default: [] (no dedup check).
#   validatorId: my-registry-validator  # Optional identifier for a custom per-entry validator. Default: none.

# Repo-doc generation (#2993/#3002): opt-in only, off by default. Uncomment to let Gittensory open a PR
# generating/refreshing AGENTS.md/CLAUDE.md (and later, skill files) from this repo's own profile. There
# is no DB-backed dashboard counterpart -- precedence is simply this manifest value, or fully disabled
# when the block (or `enabled`) is absent.
# repoDocGeneration:
#   enabled: true            # Bool. Default: false (never touched by the generator).
#   scope: [agents]          # agents | skills, one or more. Default: [] ("skills" is not shipped yet).
#   allowOverwriteExisting: false  # Bool. Opt-in to propose overwriting a hand-maintained, non-generated
#                                   # AGENTS.md/CLAUDE.md. Default: false (left alone if not recognizably generated).
#   refreshIntervalDays: 7   # Positive integer. Minimum days between scheduled refresh attempts. Default: 7.

# Maintainer review recap digest (#1963): opt-in only, off by default. Uncomment to let Gittensory build a
# periodic summary of recent review activity (PRs merged/closed, gate merge precision) for this repo. Discord
# delivery only for now (reuses the same per-repo webhook resolution as the per-PR notifier); Slack is a
# follow-up. There is no DB-backed dashboard counterpart -- precedence is simply this manifest value, or
# fully disabled when the block (or `enabled`) is absent. This PR ships the builder + a manually-triggerable
# delivery only -- the scheduled cron trigger is a scoped follow-up.
# reviewRecap:
#   enabled: true    # Bool. Default: false (no recap is ever built or posted).
#   cadenceDays: 7   # Positive integer. Days of activity each recap covers. Default: 7 (weekly).

# Cross-repo maintainer recap digest (#1963, #2250): config-as-code override for the CRON-scheduled digest
# that folds gate-precision + outcome-calibration across every scanned repo into one report (distinct from
# the single-repo reviewRecap above). Operator-level, not per-repo -- only meaningful on the gittensory
# self-repo's own manifest (the repo this instance identifies as); a present block there wins over the
# GITTENSORY_MAINTAINER_RECAP / GITTENSORY_RECAP_CADENCE env vars, which stay the fallback when absent.
# maintainerRecap:
#   enabled: true         # Bool. Default: false (env vars decide instead).
#   cadence: weekly        # daily | weekly. Default: weekly. Invalid values fall back to weekly.
#   channel: discord       # discord (only supported channel today). Invalid values fall back to discord.
