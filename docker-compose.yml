# Self-host for gittensory (#980). Two ways to boot the `gittensory` service — everything else in
# this compose file (profiles, env, health checks) is identical either way:
#
#   RECOMMENDED: ./scripts/deploy-selfhost-image.sh     # pulls the published image, no local build
#   Building from source: docker compose up --build     # for contributors / custom Dockerfile changes
#
# SECRETS: copy .env.selfhost.example → .env (the focused self-host starter) or .env.example → .env
# (the exhaustive reference) and fill in your GitHub App credentials and any optional secrets. The
# file is gitignored. Every value in either sample is a placeholder — never commit real secrets.
#
# PROFILES — activate optional services by passing --profile <name> (combine freely):
#
#   (none)                  SQLite + Redis single-node stack (default — no flags needed)
#   --profile postgres      pgvector/pg16 shared database (multi-instance capable)
#   --profile pgbouncer     PgBouncer connection pooler in front of Postgres
#   --profile qdrant        Qdrant vector database for RAG
#   --profile ollama        Local Ollama AI backend
#   --profile litestream    Continuous SQLite backup to S3/B2/R2 via Litestream
#   --profile caddy         Caddy HTTPS terminator with auto-TLS (set DOMAIN= in .env)
#   --profile observability Prometheus + Alertmanager + Loki + Promtail + Grafana (pre-wired)
#   --profile tailscale     Tailscale sidecar — access the stack via your tailnet
#   --profile runners       GitHub Actions self-hosted runner
#
# Examples:
#   ./scripts/deploy-selfhost-image.sh                            # SQLite + Redis, published image
#   docker compose up --build                                    # SQLite + Redis, build from source
#   docker compose --profile postgres --profile caddy up -d     # Postgres + HTTPS
#   docker compose --profile observability up -d                 # metrics + logs + dashboards
#   docker compose --profile tailscale --profile runners up -d   # tailnet + CI runners

# Bounded container logging (#audit-rate-headroom): every service below defaults to Docker's
# json-file driver, which has NO size cap on its own -- a long-running 24/7 stack can fill the
# host disk purely from log growth (the app, Postgres, Redis, and the CI runners are the biggest
# producers). This anchor caps each service to 3 rotated files of 10MB (30MB/service ceiling,
# ~600MB worst case across every service in this file) and is merged into every service via
# `<<: *default-logging`. Override per-service if you need more retained log history.
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Core app (always runs) ─────────────────────────────────────────────────
  gittensory:
    build:
      context: .
      args:
        INSTALL_AI_CLIS: "${INSTALL_AI_CLIS:-true}"
        INSTALL_VISUAL_REVIEW: "${INSTALL_VISUAL_REVIEW:-false}"
    restart: unless-stopped
    <<: *default-logging
    ports:
      # Remove this when using the caddy profile — Caddy becomes the public listener.
      - "${PORT:-8787}:8787"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8787"
      DATABASE_PATH: /data/gittensory.sqlite
      # Container-private per-repo config (#1390): point at a mounted dir holding {owner}__{repo}/.gittensory.yml
      # files (and an optional root .gittensory.yml global fallback). Keeps each repo's policy OUT of the public
      # GitHub repo so contributors can't game the rules. Empty/unmounted ⇒ repos use the public file / defaults.
      GITTENSORY_REPO_CONFIG_DIR: "${GITTENSORY_REPO_CONFIG_DIR:-/config}"
      # Claude Code usage telemetry → OTEL collector → Prometheus → Claude usage dashboard. OFF unless you set
      # CLAUDE_CODE_ENABLE_TELEMETRY=1 in .env (requires --profile observability so the otel-collector is up).
      CLAUDE_CODE_ENABLE_TELEMETRY: "${CLAUDE_CODE_ENABLE_TELEMETRY:-}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-otlp}"
      # Claude Code trace export (beta) → OTEL collector → Tempo. Empty by default; set OTEL_TRACES_EXPORTER=otlp
      # in .env (with CLAUDE_CODE_ENABLE_TELEMETRY=1) to capture per-review spans.
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}"
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-cumulative}"
      OTEL_METRIC_EXPORT_INTERVAL: "${OTEL_METRIC_EXPORT_INTERVAL:-10000}"
      # Uncomment the next two lines and activate --profile postgres to use Postgres:
      # DATABASE_URL: postgres://gittensory:${POSTGRES_PASSWORD:-CHANGEME}@postgres:5432/gittensory
      # PGVECTOR_ENABLED: "true"
      # With --profile pgbouncer, route through the pooler instead of postgres directly:
      # DATABASE_URL: postgres://gittensory:${POSTGRES_PASSWORD:-CHANGEME}@pgbouncer:5432/gittensory
      # Required shared transient state for review correctness, webhook dedup, and rate limiting.
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      # Enables the GitHub GET-response cache when >0 (0 disables); not a per-entry TTL, see .env.example.
      GITHUB_CACHE_TTL_SECONDS: "${GITHUB_CACHE_TTL_SECONDS:-20}"
      # Uncomment for Qdrant RAG vector store (--profile qdrant):
      # QDRANT_URL: http://qdrant:6333
      # Uncomment for Ollama AI (--profile ollama):
      # AI_PROVIDER: ollama
      # OLLAMA_AI_BASE_URL: http://ollama:11434/v1
      # BROKERED mode — use the central Gittensory Orb App instead of creating your own GitHub App. Install the
      # Orb App on your repos + set ORB_ENROLLMENT_SECRET in .env (loaded above); the engine then brokers
      # short-lived GitHub tokens from the Orb on demand (no own App private key). See .env.example.
      # ORB_BROKER_URL: https://gittensory-api.aethereal.dev   # override only for a private Orb deployment
    volumes:
      - gittensory-data:/data
      # Container-private per-repo config dir (read-only). Create ./gittensory-config/{owner}__{repo}/.gittensory.yml
      # locally (gitignored — never commit real policy). Absent ⇒ Docker mounts an empty dir ⇒ defaults apply.
      - ./gittensory-config:/config:ro
    depends_on:
      redis:
        condition: service_healthy
      # Gate startup on a healthy Qdrant when --profile qdrant is active; required:false means the
      # dependency is ignored when qdrant isn't started (default/other profiles). Belt-and-suspenders
      # with the app-side waitForQdrant retry in src/server.ts (which also covers a mid-life restart).
      qdrant:
        condition: service_healthy
        required: false
      # Same pattern for --profile postgres / --profile pgbouncer: without this, compose starts gittensory
      # in parallel with a cold Postgres initdb instead of waiting for it, and the app's own waitForPostgres()
      # fallback (~30s hard cap) commonly loses that race on a slow disk/first pull, crash-looping the app via
      # restart: unless-stopped before Postgres is reachable. required:false keeps the default SQLite path
      # (no profile active) unaffected.
      postgres:
        condition: service_healthy
        required: false
      pgbouncer:
        condition: service_healthy
        required: false
    # Sane defaults so a runaway optional service (below) can't OOM-kill or starve the core review pipeline;
    # override via .env for a bigger/smaller host (#1828).
    deploy:
      resources:
        limits:
          memory: "${GITTENSORY_MEM_LIMIT:-2g}"
    healthcheck:
      # Probe /ready (not /health): /health is a liveness stub that is 200 even when the DB is down,
      # whereas /ready returns 503 until the DB answers AND migrations are applied — so dependents that
      # wait on `condition: service_healthy` only start once the app is truly serving. start_period 60s
      # tolerates the Postgres cold start (waitForPostgres blocks up to 30s before the HTTP server binds).
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Redis (always on; required by the review runtime) ─────────────────────
  # Shared transient review state: pending-CI first-seen stamps, webhook dedup/coalescing, rate limits, and
  # short-lived GitHub caches. Losing it on restart is safe; the app requires it while running.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    deploy:
      resources:
        limits:
          memory: "${REDIS_MEM_LIMIT:-512m}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Postgres (--profile postgres | --profile pgbouncer) ───────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    <<: *default-logging
    profiles: ["postgres", "pgbouncer"]
    environment:
      POSTGRES_USER: gittensory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
      POSTGRES_DB: gittensory
    volumes:
      - gittensory-pg:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: "${POSTGRES_MEM_LIMIT:-2g}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gittensory"]
      interval: 10s
      retries: 5

  # ── PgBouncer (--profile pgbouncer) ───────────────────────────────────────
  # Transaction-mode pooler — allows hundreds of app clients with a small PG connection cap.
  # Set DATABASE_URL in gittensory to: postgres://gittensory:<pw>@pgbouncer:5432/gittensory
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["pgbouncer"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: gittensory
      DB_USER: gittensory
      DB_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
      LISTEN_PORT: "5432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: md5
    # The image ships the full postgresql-client toolchain (Alpine-based), so the same probe postgres itself
    # uses works here: pg_isready only checks that the server accepts the startup packet, not that auth
    # succeeds, so it reports "accepting connections" even before the upstream Postgres is reachable through
    # the pooler — exactly the pooler-layer liveness signal gittensory's depends_on needs.
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres internals exporter. Starts with the Postgres profiles so Prometheus can scrape it when
  # observability is enabled, without starting against a missing DB on SQLite-only installs.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.20.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["postgres", "pgbouncer"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:5432/gittensory?sslmode=disable"
      DATA_SOURCE_USER: gittensory
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-CHANGEME}
    expose:
      - "9187"

  # ── Qdrant (--profile qdrant) ─────────────────────────────────────────────
  # Dedicated vector database for RAG — replaces the built-in sqlite-vec / pgvector when
  # QDRANT_URL=http://qdrant:6333 is set. Scales to millions of vectors with ANN search.
  # REST API: http://localhost:6333  gRPC: localhost:6334  Dashboard: http://localhost:6333/dashboard
  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    <<: *default-logging
    profiles: ["qdrant"]
    # Ports are bound to LOOPBACK (127.0.0.1), not 0.0.0.0: the app reaches Qdrant over the internal
    # docker network (QDRANT_URL=http://qdrant:6333), so the host mapping exists only for the local
    # dashboard/debugging. The local container runs UNAUTHENTICATED, and it holds the RAG embeddings +
    # PR context — never expose it beyond localhost without setting QDRANT_API_KEY (honored by
    # qdrant-vectorize.ts) plus a firewall rule. SSH-forward the port for remote dashboard access. This
    # matches the in-network-only posture of Prometheus/Loki/Alertmanager above.
    ports:
      - "127.0.0.1:6333:6333" # REST API + Web UI (localhost only)
      - "127.0.0.1:6334:6334" # gRPC (localhost only)
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: "${QDRANT_MEM_LIMIT:-2g}"
    # The image is Debian (bash present) but ships no curl/wget/nc. bash's /dev/tcp pseudo-device speaks
    # HTTP without an external binary, so we hit Qdrant's k8s-style /readyz probe (200 once it accepts
    # traffic). This lets the app's depends_on gate on a serving Qdrant. /readyz is unauthenticated even
    # when QDRANT_API_KEY is set, so no secret is needed here.
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && grep -q "200 OK" <&3'
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ── Ollama (--profile ollama) ──────────────────────────────────────────────
  # After `docker compose --profile ollama up -d`, pull a model:
  #   docker compose exec ollama ollama pull llama3.2
  # Then set AI_PROVIDER=ollama and OLLAMA_AI_BASE_URL=http://ollama:11434/v1 in .env.
  ollama:
    image: ollama/ollama:0.30.10
    restart: unless-stopped
    <<: *default-logging
    profiles: ["ollama"]
    volumes:
      - ollama-models:/root/.ollama
    # The image ships the ollama CLI but no curl/wget, so probe the daemon through it directly instead of a
    # raw HTTP request: `ollama list` only succeeds once the server is accepting API calls.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    # Ollama can load multi-GB models into memory; default high enough for common 7-8B quantized models but
    # cap it so a large model pull can't exhaust host RAM and take down the core review pipeline (#1828).
    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEM_LIMIT:-8g}"

  # ── Litestream (--profile litestream) ─────────────────────────────────────
  # Continuous WAL backup of the SQLite DB to S3/B2/R2. Copy litestream.yml.example
  # → litestream.yml and fill in your bucket. Set LITESTREAM_* secrets in .env.
  litestream:
    image: litestream/litestream:0.5.12
    restart: unless-stopped
    <<: *default-logging
    profiles: ["litestream"]
    command: replicate
    depends_on:
      gittensory:
        condition: service_healthy
    volumes:
      - gittensory-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID:-}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY:-}
      LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT:-}
      LITESTREAM_REGION: ${LITESTREAM_REGION:-us-east-1}

  # ── Caddy (--profile caddy) ────────────────────────────────────────────────
  # Auto-TLS via Let's Encrypt. Set DOMAIN=reviews.yourcompany.com in .env, then
  # remove the plain `ports:` entry from the gittensory service above.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    <<: *default-logging
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 QUIC
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      gittensory:
        condition: service_healthy

  # ── Observability (--profile observability) ────────────────────────────────
  # Prometheus scrapes /metrics; Alertmanager routes alerts; Loki+Promtail collect logs;
  # Grafana visualises metrics AND logs. Grafana UI: http://localhost:3000 (admin / $GRAFANA_ADMIN_PASSWORD).
  prometheus:
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-180d}"
    deploy:
      resources:
        limits:
          memory: "${PROMETHEUS_MEM_LIMIT:-1g}"

  # Routes Prometheus alerts to your notification channel. Ships SILENT: alerts go to a
  # null receiver until you fill in a receiver in alertmanager/alertmanager.yml.
  alertmanager:
    image: prom/alertmanager:v0.33.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    depends_on: [prometheus]
    expose:
      - "9093" # in-network only; reach the UI/API via `docker compose port` or a tunnel
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      reporting-exporter:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Maintainer dashboards query only the redacted reporting export, never the live app DB.
      - grafana-reporting-data:/reporting:ro
    environment:
      # Compose interpolates every service even when --profile observability is inactive, so the required-password
      # check lives in entrypoint below. Runtime still fails closed unless the operator sets GRAFANA_ADMIN_PASSWORD.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-${GRAFANA_LOCAL_SMOKE_PASSWORD:-}}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: frser-sqlite-datasource,grafana-github-datasource
      # Read-only fine-grained PAT for the GitHub data source provisioning ($GITHUB_TOKEN expansion). From .env.
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    deploy:
      resources:
        limits:
          memory: "${GRAFANA_MEM_LIMIT:-512m}"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ -z "$${GF_SECURITY_ADMIN_PASSWORD:-}" ]; then
          echo >&2 "Set GRAFANA_ADMIN_PASSWORD in .env before using --profile observability, or set GRAFANA_LOCAL_SMOKE_PASSWORD for local-only smoke tests."
          exit 1
        fi
        exec /run.sh

  reporting-exporter:
    image: alpine:3.20
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    depends_on:
      gittensory:
        condition: service_healthy
    volumes:
      # The exporter needs live DB read access to build the redacted snapshot. Grafana does not get this mount.
      - gittensory-data:/appdb:ro
      - grafana-reporting-data:/reporting
      - ./scripts/export-grafana-reporting-db.sh:/export-grafana-reporting-db.sh:ro
    environment:
      # Default SQLite app DB path maps app /data/gittensory.sqlite to exporter /appdb/gittensory.sqlite.
      # If you override DATABASE_PATH, set this to the matching /appdb/<file> path. When DATABASE_URL points at
      # Postgres, the exporter reads Postgres with psql and still writes the same redacted SQLite reporting DB
      # for Grafana. Set GITTENSORY_REPORTING_SOURCE_DATABASE_URL only if the reporting reader uses a different URL.
      GITTENSORY_REPORTING_SOURCE_DB: "${GITTENSORY_REPORTING_SOURCE_DB:-/appdb/gittensory.sqlite}"
      GITTENSORY_REPORTING_SOURCE_DATABASE_URL: "${GITTENSORY_REPORTING_SOURCE_DATABASE_URL:-}"
      DATABASE_URL: "${DATABASE_URL:-}"
      GITTENSORY_REPORTING_DIR: /reporting
      GITTENSORY_REPORTING_DB: "${GITTENSORY_REPORTING_DB:-/reporting/gittensory-reporting.sqlite}"
      GRAFANA_REPORTING_EXPORT_INTERVAL_SECONDS: "${GRAFANA_REPORTING_EXPORT_INTERVAL_SECONDS:-30}"
    command:
      - /bin/sh
      - -c
      - >-
        apk add --no-cache sqlite postgresql16-client >/dev/null 2>&1 &&
        while true; do
          sh /export-grafana-reporting-db.sh || echo '[reporting] export failed';
          interval="$${GRAFANA_REPORTING_EXPORT_INTERVAL_SECONDS:-30}";
          case "$$interval" in ''|*[!0-9]*) interval=30;; esac;
          sleep "$$interval";
        done
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "db=\"$${GITTENSORY_REPORTING_DB:-/reporting/gittensory-reporting.sqlite}\"; test -s \"$$db\" && sqlite3 \"$$db\" 'PRAGMA quick_check;' | grep -q '^ok$'",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Log pipeline (--profile observability) ─────────────────────────────────
  # Loki stores logs; Promtail discovers every container in this compose project via the read-only
  # docker-proxy (NOT a raw socket) and ships their logs to Loki. Browse in Grafana → Explore →
  # Loki, e.g. {service="gittensory"} | json | level="error".
  loki:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    deploy:
      resources:
        limits:
          memory: "${LOKI_MEM_LIMIT:-1g}"
    # No healthcheck: grafana/loki:latest is distroless (no shell/wget/curl), so an in-container probe
    # can't run — a CMD-SHELL check would leave the container stuck "starting". Readiness is observable
    # at GET /ready; Promtail retries/backs off until Loki accepts pushes and Grafana retries the
    # datasource, so nothing depends on a Docker health gate here.

  # Read-only Docker-API proxy that fronts the socket for Promtail's service discovery. Promtail must
  # NOT be given the raw /var/run/docker.sock: a `:ro` socket bind-mount only protects the socket inode,
  # it does NOT restrict the Docker API, so socket access is effectively host root (enumerate containers,
  # read env/secrets + all container logs, create a privileged container and escape to the host — the
  # same risk the `runner` service notes below). This proxy is the ONLY container touching the socket; it
  # allows just the read-only `/containers/*` endpoints docker_sd needs (list/inspect/logs) and blocks
  # every mutating call (POST=0 → no create/exec/start). Even read-only, GET /containers/{id}/json still
  # returns each container's Config.Env, so the proxy is isolated on a dedicated `docker-proxy` network
  # shared ONLY with Promtail (publishing no host port is not enough — the default network is reachable by
  # every service). No other container can reach :2375 to harvest secrets from peers' environments.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    environment:
      CONTAINERS: "1" # GET /containers/* (list, inspect, logs)
      NETWORKS: "1" # GET /networks/* — docker_sd computes per-target network labels
      POST: "0" # deny every mutating call; strictly read-only (no create/exec/start)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [docker-proxy] # isolated — only Promtail joins this network

  promtail:
    image: grafana/promtail:3.6.11
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    command:
      [
        "-config.file=/etc/promtail/promtail-config.yml",
        "-config.expand-env=true",
      ]
    depends_on: [loki, docker-proxy]
    environment:
      # Promtail expands this into its Docker label filter so discovery stays inside this Compose project.
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-gittensory}
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Persist read positions so restarts don't re-ship the whole log history.
      - promtail-data:/tmp/positions
    # `default` reaches Loki for pushes; `docker-proxy` reaches the socket proxy for discovery. Promtail is
    # the only service on `docker-proxy`, so the inspect endpoint (and the env it exposes) is unreachable
    # from any other container. No Docker-socket mount — discovery goes through the proxy's read-only API.
    networks: [default, docker-proxy]

  # ── OTEL collector (--profile observability) ──────────────────────────────
  # Receives OTLP metrics from the Claude Code review CLI and re-exposes them on :8889 for Prometheus to
  # scrape — powering the Claude usage analytics (cost / tokens / sessions / models). Enable by setting
  # CLAUDE_CODE_ENABLE_TELEMETRY=1 in .env. Pinned to a known-good version (image layers are reproducible).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    depends_on:
      tempo:
        condition: service_healthy
    # Mount our config at the image's default path so the stock entrypoint picks it up (no command override).
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro

  # ── Tempo (--profile observability) — trace store for Claude review spans ─────
  # Receives traces forwarded by the OTEL collector and serves them to Grafana (the Tempo data source).
  # Local-storage single binary; needs no extra config beyond ./tempo/tempo.yaml.
  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    <<: *default-logging
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    deploy:
      resources:
        limits:
          memory: "${TEMPO_MEM_LIMIT:-1g}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 12

  # ── Tailscale (--profile tailscale) ───────────────────────────────────────
  # Joins your tailnet so the stack is accessible via Tailscale IP/hostname — no
  # public ports exposed. Generate an auth key at tailscale.com/settings/keys and
  # set TS_AUTHKEY= in .env. The gittensory service is reachable at the tailnet IP on port 8787.
  tailscale:
    # Kept on the `stable` release channel rather than a version tag: tailscale's ghcr tags use a
    # non-obvious scheme and the client is happiest tracking the current stable. For a fully immutable
    # pin, resolve a digest once: docker pull ghcr.io/tailscale/tailscale:stable && docker inspect \
    #   --format='{{index .RepoDigests 0}}' ghcr.io/tailscale/tailscale:stable
    image: ghcr.io/tailscale/tailscale:stable
    restart: unless-stopped
    <<: *default-logging
    profiles: ["tailscale"]
    hostname: gittensory
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    network_mode: host # Tailscale needs host networking to advertise the host's address

  # ── Self-hosted GitHub Actions runner (--profile runners) ─────────────────
  # Runs `runs-on: self-hosted` jobs on this machine. Set RUNNER_TOKEN= (or ACCESS_TOKEN=)
  # and RUNNER_REPO_URL= (e.g. https://github.com/your-org/your-repo) in .env.
  # Get a token at: https://github.com/<owner>/<repo>/settings/actions/runners/new
  # Running this alongside the main `gittensory` app on the SAME host? A burst of CI jobs can starve the
  # app of CPU with no limits set (the default below). See docker-compose.override.yml.example for a
  # proven CPU-priority pattern (relative cpu_shares + a per-container cpus ceiling) before scaling this up.
  runner:
    # Pin to a specific version tag — `latest` is mutable. Find a digest via:
    # docker pull myoung34/github-runner:ubuntu-jammy && docker inspect --format='{{index .RepoDigests 0}}' myoung34/github-runner:ubuntu-jammy
    image: myoung34/github-runner:ubuntu-jammy
    restart: unless-stopped
    <<: *default-logging
    profiles: ["runners"]
    environment:
      RUNNER_SCOPE: ${RUNNER_SCOPE:-repo}
      REPO_URL: ${RUNNER_REPO_URL:-}
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      ACCESS_TOKEN: ${RUNNER_ACCESS_TOKEN:-}
      RUNNER_NAME: ${RUNNER_NAME:-gittensory-runner}
      LABELS: ${RUNNER_LABELS:-self-hosted,linux,x64}
      RUNNER_WORKDIR: /tmp/runner
      # Docker builds are disabled by default. To enable DinD (Docker-in-Docker) for workflows that
      # need `docker build/push`, add a `dind` sidecar service and set DOCKER_HOST here. Mounting
      # /var/run/docker.sock grants container-escape risk and is intentionally omitted.
    volumes:
      - runner-work:/tmp/runner

  # ── Backups (--profile backup) ────────────────────────────────────────────
  # Active database backup (Postgres pg_dump or WAL-safe SQLite online backup) + a Qdrant snapshot, on a loop
  # (default daily), kept in the gittensory-backups volume with retention. Run on demand:
  #   docker compose --profile backup run --rm backup sh /backup.sh
  # Verify the newest backup is restorable (pg_restore --list / SQLite integrity_check; opt-in scratch restore):
  #   docker compose --profile backup run --rm backup sh /verify-backup.sh
  backup:
    image: alpine:3.20
    restart: unless-stopped
    <<: *default-logging
    profiles: ["backup"]
    environment:
      DATABASE_PATH: /data/gittensory.sqlite
      DATABASE_URL: "${DATABASE_URL:-}"
      GITTENSORY_BACKUP_SOURCE_DATABASE_URL: "${GITTENSORY_BACKUP_SOURCE_DATABASE_URL:-}"
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      BACKUP_RETAIN: ${BACKUP_RETAIN:-7}
      # Opt-in restore drill (verify-backup.sh): restore the newest dump into a THROWAWAY database, never the
      # live one. Both must be set, and the scratch URL must differ from the backup source.
      VERIFY_RESTORE_SCRATCH: "${VERIFY_RESTORE_SCRATCH:-}"
      GITTENSORY_VERIFY_SCRATCH_DATABASE_URL: "${GITTENSORY_VERIFY_SCRATCH_DATABASE_URL:-}"
    volumes:
      # RW (not :ro) so SQLite's online-backup can use the WAL index; the script only ever reads the DB.
      - gittensory-data:/data
      - gittensory-backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/verify-backup.sh:/verify-backup.sh:ro
    # `docker compose run --rm backup sh /backup.sh` (or /verify-backup.sh) REPLACES `command:`, not
    # `entrypoint:`, so the package install must live in the entrypoint or an on-demand run gets a bare
    # container with no pg_restore/sqlite3/psql. The entrypoint installs packages once, then `exec "$@"`
    # runs whatever command is in effect — the default loop below, or a `run` override. The trailing `sh`
    # entrypoint arg is a placeholder $0 so the real payload lands in "$@" starting at $1, not $0.
    entrypoint:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache sqlite postgresql16-client curl >/dev/null 2>&1
        exec "$@"
      - sh
    command:
      - sh
      - -c
      - "while true; do sh /backup.sh || echo '[backup] run failed'; sleep ${BACKUP_INTERVAL_SECONDS:-86400}; done"

  # Read-only backup freshness exporter. It serves file-age metrics from the retained backup volume so
  # Prometheus can alert on missing or stale database backups without Grafana reading the live app DB.
  backup-exporter:
    image: alpine:3.20
    restart: unless-stopped
    <<: *default-logging
    profiles: ["backup"]
    volumes:
      - gittensory-backups:/backups:ro
      - ./scripts/backup-metrics.sh:/backup-metrics.sh:ro
    expose:
      - "9101"
    command:
      - /bin/sh
      - -c
      - "apk add --no-cache busybox-extras && sh /backup-metrics.sh"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9101/metrics | grep -q '^gittensory_backup_latest_timestamp_seconds'"]
      interval: 30s
      retries: 5

volumes:
  gittensory-data:
  gittensory-pg:
  qdrant-data:
  ollama-models:
  caddy-data:
  caddy-config:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  grafana-reporting-data:
  loki-data:
  promtail-data:
  tailscale-state:
  runner-work:
  gittensory-backups:
  tempo-data:

networks:
  # The implicit project network every service joins by default (declared so it can be referenced
  # explicitly where a service also needs the isolated proxy network below).
  default:
  # Isolated network for the Docker-socket proxy. `internal: true` blocks external/internet egress, and
  # only docker-proxy + promtail join it — so the proxy's inspect endpoint (which exposes every
  # container's Config.Env) is unreachable from any other service. See the docker-proxy service notes.
  docker-proxy:
    internal: true
